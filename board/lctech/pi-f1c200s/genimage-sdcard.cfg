# SD-card image for the Lctech Pi F1C200s.
#   - offset 8 KiB : u-boot-sunxi-with-spl.bin (BROM loads SPL from here)
#   - partition 1  : FAT (zImage + dtb)   -> /dev/mmcblk0p1
#   - partition 2  : ext4 root filesystem -> /dev/mmcblk0p2

image boot.vfat {
	vfat {
		files = {
			"zImage",
			"suniv-f1c200s-lctech-pi.dtb"
		}
	}

	size = 8M
}

image sdcard.img {
	hdimage {
	}

	# Not in the partition table: the BROM expects the SPL at a fixed
	# 8 KiB offset, which would otherwise overlap partition 1.
	partition u-boot {
		in-partition-table = "no"
		image = "u-boot-sunxi-with-spl.bin"
		offset = 8K
		size = 504K # 512K - 8K
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
		size = 0
	}
}
