# DHCP for the SoftAP (started by `ap on` with -C this-file; not the system
# dnsmasq config -- the S80dnsmasq autostart is removed at image build).
# AP subnet: 192.168.9.0/24 (eth-dev uses .7.x, usb-gadget .8.x).
interface=wlan0
bind-interfaces
dhcp-range=192.168.9.10,192.168.9.50,12h
dhcp-option=option:router,192.168.9.1
dhcp-authoritative
