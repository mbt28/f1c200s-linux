# WiFi STA config for `wifi on` (S43wifi starts wpa_supplicant with this).
# 1. Replace ssid/psk below (the ESP32 radio is 2.4 GHz-only, 802.11b/g/n).
# 2. Optionally replace the plaintext psk with the hashed one from:
#      wpa_passphrase "YOUR_SSID" "YOUR_PASSWORD"
# 3. Apply: wifi off; wifi on      (persists across reboots)
ctrl_interface=/var/run/wpa_supplicant
update_config=1

network={
	ssid="YOUR_SSID"
	psk="YOUR_PASSWORD"
}
