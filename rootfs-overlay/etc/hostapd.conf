# SoftAP config for `ap on` (roadmap P5; wireless Android Auto joins this AP).
# The ESP32 radio is 2.4 GHz-only, 802.11b/g/n. Change ssid/wpa_passphrase,
# then: ap off; ap on. Uncomment country_code for your regulatory domain.
interface=wlan0
driver=nl80211
ssid=f1c200s-ap
#country_code=DE
hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=1
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase=CHANGEME_AP_PASS
